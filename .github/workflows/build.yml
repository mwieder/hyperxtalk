name: Build HyperXTalk

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
  push:
    tags:
      - 'v*'

# Opt in to Node.js 24 for all actions runners.
# actions/checkout, setup-python, upload-artifact etc. ship Node.js 24-compatible
# releases within their current major versions (@v4 / @v5); this env var tells
# the runner to use them before the June 2nd 2026 forced cut-over.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # macOS ARM64
  # ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS ARM64
    runs-on: macos-15        # macOS 15 Sequoia — Apple Silicon (ARM64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Accept Xcode licence
        run: sudo xcodebuild -license accept

      - name: Install Homebrew dependencies
        run: |
          brew install openssl@3 libpq mysql-client pixman meson ninja pkg-config
          brew install --cask vlc

      - name: Set up Java (Temurin — required by libfoundation JNI bindings)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configure (GYP → Xcode projects)
        run: make config-mac

      - name: Build prebuilt third-party libraries
        run: make prebuilt-mac
        env:
          BUILDTYPE: ${{ inputs.build_type || 'Release' }}

      - name: Compile
        run: make compile-mac CODESIGN_IDENTITY="-"
        env:
          BUILDTYPE: ${{ inputs.build_type || 'Release' }}

      - name: Package (mac-bin)
        run: make package-mac-bin CODESIGN_IDENTITY="-"
        env:
          BUILDTYPE: ${{ inputs.build_type || 'Release' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperXTalk-macOS-ARM64-${{ inputs.build_type || 'Release' }}
          path: mac-bin/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Linux x86_64
  # ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential python3 python3-pip pkg-config \
            meson ninja-build \
            libssl-dev libcurl4-openssl-dev \
            libgtk-3-dev libglib2.0-dev \
            libpng-dev libjpeg-dev libfreetype6-dev libfontconfig1-dev \
            libx11-dev libxext-dev libxrender-dev \
            libxinerama-dev libxrandr-dev libxcb1-dev libxv-dev libdbus-1-dev libcups2-dev \
            libgif-dev libpcre3-dev zlib1g-dev \
            libvlc-dev \
            default-jdk \
            fuse libfuse2

      - name: Prepare cairo-features.h for Linux
        run: |
          # The committed cairo-features.h was generated for macOS (Quartz backend).
          # Overwrite it with the Linux/FreeType backend feature set.
          cat > thirdparty/libcairo/src/cairo-features.h << 'EOF'
          /* Hand-crafted for Linux / GCC x86-64 — replaces the macOS meson output. */
          #pragma once
          #define CAIRO_FEATURES_H
          #define CAIRO_HAS_FC_FONT 1
          #define CAIRO_HAS_FT_FONT 1
          #define CAIRO_HAS_IMAGE_SURFACE 1
          #define CAIRO_HAS_MIME_SURFACE 1
          #define CAIRO_HAS_OBSERVER_SURFACE 1
          #define CAIRO_HAS_PDF_SURFACE 1
          #define CAIRO_HAS_PNG_FUNCTIONS 1
          #define CAIRO_HAS_PS_SURFACE 1
          #define CAIRO_HAS_RECORDING_SURFACE 1
          #define CAIRO_HAS_SCRIPT_SURFACE 1
          #define CAIRO_HAS_SVG_SURFACE 1
          #define CAIRO_HAS_USER_FONT 1
          #define CAIRO_HAS_XLIB_SURFACE 1
          #define CAIRO_HAS_XLIB_XRENDER_SURFACE 1
          EOF

      - name: Configure (GYP → Makefiles)
        run: ./config.sh --platform linux-x86_64

      - name: Compile
        run: make compile-linux-x86_64
        env:
          BUILDTYPE: ${{ inputs.build_type || 'Release' }}

      - name: Build AppImage
        run: |
          chmod +x packaging/linux/build-appimage.sh
          ./packaging/linux/build-appimage.sh \
            build-linux-x86_64/livecode \
            "${{ inputs.build_type || 'Release' }}"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperXTalk-Linux-x86_64-AppImage
          path: build-linux-x86_64/livecode/HyperXTalk-*.AppImage
          retention-days: 30

      - name: Upload raw build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperXTalk-Linux-x86_64-${{ inputs.build_type || 'Release' }}
          path: linux-x86_64-bin/
          retention-days: 30
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Windows x86_64
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x86_64
    runs-on: windows-2022     # Pinned to VS 2022 (v143 toolset); migrate to windows-2025-vs2026 when ready

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Scoop
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          # Make scoop shims available to all subsequent steps
          echo "$env:USERPROFILE\scoop\shims" >> $env:GITHUB_PATH

      - name: Install MySQL and PostgreSQL via Scoop
        shell: pwsh
        run: |
          scoop install mysql postgresql

      - name: Restore NuGet packages (WebView2)
        shell: pwsh
        run: |
          $target = "packages\Microsoft.Web.WebView2.1.0.3912.50"
          $webview2h = "$target\build\native\include\WebView2.h"
          if (-not (Test-Path $webview2h)) {
            # Download .nupkg directly from nuget.org and extract it.
            # The nuget CLI "Package already installed" behaviour does not reliably
            # place files in the local output directory, so we bypass it entirely.
            $nupkg = "$env:TEMP\webview2.nupkg"
            Invoke-WebRequest "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/1.0.3912.50" -OutFile $nupkg
            Expand-Archive $nupkg -DestinationPath $target -Force
          }
          if (-not (Test-Path $webview2h)) {
            Write-Error "WebView2.h still not found at: $webview2h"
            exit 1
          }
          Write-Host "WebView2.h found at: $webview2h"

      - name: Prepare libcairo config.h for Windows
        shell: cmd
        run: copy thirdparty\libcairo\src\config.h.win32 thirdparty\libcairo\src\config.h

      - name: Prepare cairo-features.h for Windows
        shell: pwsh
        run: |
          # The committed cairo-features.h was generated for macOS (Quartz backend).
          # Overwrite it with the Windows/Win32 backend feature set.
          Set-Content -Path "thirdparty\libcairo\src\cairo-features.h" -Value @"
          /* Hand-crafted for Windows / MSVC x64 — replaces the macOS meson output. */
          #pragma once
          #define CAIRO_FEATURES_H
          #define CAIRO_HAS_IMAGE_SURFACE 1
          #define CAIRO_HAS_MIME_SURFACE 1
          #define CAIRO_HAS_OBSERVER_SURFACE 1
          #define CAIRO_HAS_PDF_SURFACE 1
          #define CAIRO_HAS_PNG_FUNCTIONS 1
          #define CAIRO_HAS_PS_SURFACE 1
          #define CAIRO_HAS_RECORDING_SURFACE 1
          #define CAIRO_HAS_SCRIPT_SURFACE 1
          #define CAIRO_HAS_SVG_SURFACE 1
          #define CAIRO_HAS_USER_FONT 1
          #define CAIRO_HAS_WIN32_SURFACE 1
          #define CAIRO_HAS_WIN32_FONT 1
          "@

      - name: Prepare pixman-version.h for Windows
        shell: cmd
        run: copy thirdparty\libcairo\subprojects\pixman-0.43.4\pixman\pixman-version.h.win32 thirdparty\libcairo\subprojects\pixman-0.43.4\pixman\pixman-version.h

      - name: Add MSBuild to PATH
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find 'MSBuild\**\Bin\MSBuild.exe' | Select-Object -First 1
          $msbuildDir = Split-Path $msbuild -Parent
          echo $msbuildDir >> $env:GITHUB_PATH

      - name: Inject ATL include path via MSBuild props (needed by kernel for w32-ds-player.cpp)
        shell: pwsh
        run: |
          # kernel.vcxproj (v142 toolset) compiles w32-ds-player.cpp which needs
          # atlbase.h.  The v142 ATL component is not present on this runner, but
          # the v143 ATL headers (already installed) are compatible for compilation
          # purposes.  Rather than fighting the VS installer, we create a small
          # .props file that prepends the ATL include directory to
          # AdditionalIncludeDirectories for every project, then point
          # ForceImportBeforeCppTargets at it so MSBuild picks it up automatically.
          $atl = Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" `
                 -Filter "atlbase.h" -Recurse -ErrorAction SilentlyContinue |
                 Select-Object -First 1
          if (-not $atl) {
            Write-Error "atlbase.h not found anywhere under VS installation"
            exit 1
          }
          $atlDir = $atl.DirectoryName
          Write-Host "ATL headers found at: $atlDir"
          # Also locate atls.lib for the linker (same atlmfc tree, lib\x64 subdir)
          $atlLib = Join-Path (Split-Path $atlDir -Parent) "lib\x64"
          Write-Host "ATL lib dir: $atlLib"
          $propsPath = "${{ github.workspace }}\atl-include.props"
          # libvlc.lib is a stub import library generated by build-engine-x64.bat
          # before the engine link step.  Its output directory is always at
          # build-win-x86_64\livecode\Debug\lib relative to the workspace.
          # MSBuild reads ForceImportBeforeCppTargets per-project evaluation so
          # this is more reliable than setting %LIB% from the batch script.
          $vlcLibDir = "${{ github.workspace }}\build-win-x86_64\livecode\Debug\lib"
          Set-Content -Path $propsPath -Value @"
          <?xml version="1.0" encoding="utf-8"?>
          <Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003">
            <ItemDefinitionGroup>
              <ClCompile>
                <AdditionalIncludeDirectories>$atlDir;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>
              </ClCompile>
              <Link>
                <AdditionalLibraryDirectories>$atlLib;$vlcLibDir;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>
              </Link>
              <Lib>
                <AdditionalLibraryDirectories>$atlLib;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>
              </Lib>
            </ItemDefinitionGroup>
          </Project>
          "@
          Write-Host "Props file written to: $propsPath"
          echo "ForceImportBeforeCppTargets=$propsPath" >> $env:GITHUB_ENV

      - name: Install flex and bison (winflexbison3)
        shell: cmd
        run: choco install winflexbison3 -y

      - name: Configure (GYP → Visual Studio projects)
        shell: cmd
        run: configure.bat

      - name: Alias prebuilt directories for v143 toolset
        shell: pwsh
        run: |
          # The prebuilt libraries ship with directory names keyed on $(PlatformToolset).
          # The repo contains v142 and v145 variants; copy the v145 ones to v143 so that
          # MSBuild (running with the VS 2022 v143 toolset) can resolve them.
          $pairs = @(
            @{ Src = "prebuilt\unpacked\Thirdparty\x86_64-win32-v145_static_Debug";   Dst = "prebuilt\unpacked\Thirdparty\x86_64-win32-v143_static_Debug" },
            @{ Src = "prebuilt\unpacked\Thirdparty\x86_64-win32-v145_static_Release"; Dst = "prebuilt\unpacked\Thirdparty\x86_64-win32-v143_static_Release" },
            @{ Src = "prebuilt\unpacked\icu\x86_64-win32-v145_static_Debug";          Dst = "prebuilt\unpacked\icu\x86_64-win32-v143_static_Debug" },
            @{ Src = "prebuilt\unpacked\icu\x86_64-win32-v145_static_Release";        Dst = "prebuilt\unpacked\icu\x86_64-win32-v143_static_Release" },
            # curl only ships with a v142 variant; alias it to v143 for both configs
            @{ Src = "prebuilt\unpacked\curl\x86_64-win32-v142_static_Debug";         Dst = "prebuilt\unpacked\curl\x86_64-win32-v143_static_Debug" },
            @{ Src = "prebuilt\unpacked\curl\x86_64-win32-v142_static_Debug";         Dst = "prebuilt\unpacked\curl\x86_64-win32-v143_static_Release" },
            # openssl3 only ships with a v142 variant; alias it to v143 for both configs
            @{ Src = "prebuilt\unpacked\openssl3\x86_64-win32-v142_static_Debug";     Dst = "prebuilt\unpacked\openssl3\x86_64-win32-v143_static_Debug" },
            @{ Src = "prebuilt\unpacked\openssl3\x86_64-win32-v142_static_Release";   Dst = "prebuilt\unpacked\openssl3\x86_64-win32-v143_static_Release" }
          )
          foreach ($p in $pairs) {
            if (Test-Path $p.Src) {
              Copy-Item -Path $p.Src -Destination $p.Dst -Recurse -Force
              Write-Host "Created: $($p.Dst)"
            } else {
              Write-Warning "Source not found: $($p.Src)"
            }
          }

      - name: Replace 32-bit curl prebuilt with vcpkg x64 static build
        shell: pwsh
        run: |
          # The curl prebuilt bundled in the repo was compiled as x86 (32-bit) and
          # triggers LNK4272 when linking the x64 server target.  Use vcpkg
          # (pre-installed on windows-2022 runners) to get a proper x64 static
          # build.  vcpkg's curl defaults to the WinSSL (schannel) backend on
          # Windows, so it needs no extra OpenSSL linkage beyond what libcurl.gyp
          # already declares (libcurl_a, ws2_32, wldap32, crypt32).
          $ErrorActionPreference = "Stop"
          $vcpkg = "C:\vcpkg\vcpkg.exe"
          if (-not (Test-Path $vcpkg)) { throw "vcpkg not found at $vcpkg" }
          Write-Host "Installing curl:x64-windows-static via vcpkg..."
          & $vcpkg install "curl:x64-windows-static" 2>&1
          if ($LASTEXITCODE -ne 0) { throw "vcpkg install failed (exit $LASTEXITCODE)" }
          $pkg = "C:\vcpkg\packages\curl_x64-windows-static"
          # Locate the installed lib files (name varies slightly by vcpkg version)
          $relLib = Get-ChildItem "$pkg\lib"       -Filter "libcurl*.lib" -ErrorAction Stop | Select-Object -First 1
          $dbgLib = Get-ChildItem "$pkg\debug\lib" -Filter "libcurl*.lib" -ErrorAction Stop | Select-Object -First 1
          Write-Host "Release lib: $($relLib.FullName)"
          Write-Host "Debug   lib: $($dbgLib.FullName)"
          # The alias step already created the v143 dirs; just overwrite the .lib
          $dstDebug   = "prebuilt\unpacked\curl\x86_64-win32-v143_static_Debug\lib\libcurl_a.lib"
          $dstRelease = "prebuilt\unpacked\curl\x86_64-win32-v143_static_Release\lib\libcurl_a.lib"
          Copy-Item $dbgLib.FullName $dstDebug   -Force
          Copy-Item $relLib.FullName $dstRelease -Force
          Write-Host "x64 static curl installed:"
          Write-Host "  $dstDebug"
          Write-Host "  $dstRelease"

      - name: Build thirdparty libraries
        shell: cmd
        run: build-thirdparty-x64.bat
        # The bat builds all thirdparty libs (which we need), then attempts to
        # build development.vcxproj directly — that fails on a clean checkout
        # because startupstack.cpp hasn't been generated yet.  The engine is
        # built correctly by the next step (build-engine-x64.bat), so we
        # allow this step to fail without aborting the job.
        continue-on-error: true

      - name: Build engine (Debug — required by Release bootstrap)
        shell: cmd
        run: build-engine-x64.bat

      - name: Build Release
        shell: cmd
        run: build-release-x64.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperXTalk-Windows-x86_64-${{ inputs.build_type || 'Release' }}
          # Release output: HyperXTalk.exe, standalone-community.exe, externals, DB drivers
          path: build-win-x86_64\livecode\Release\
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release (only on v* tags)
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package artifacts for release
        run: |
          cd artifacts
          # Zip the macOS build
          if [ -d "HyperXTalk-macOS-ARM64-Release" ]; then
            (cd HyperXTalk-macOS-ARM64-Release && zip -r ../HyperXTalk-macOS-ARM64.zip .)
          fi
          # The AppImage is already a single file
          cp HyperXTalk-Linux-x86_64-AppImage/*.AppImage . 2>/dev/null || true
          # Zip the Windows build
          if [ -d "HyperXTalk-Windows-x86_64-Release" ]; then
            (cd HyperXTalk-Windows-x86_64-Release && zip -r ../HyperXTalk-Windows-x86_64.zip .)
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/HyperXTalk-macOS-ARM64.zip
            artifacts/HyperXTalk-*.AppImage
            artifacts/HyperXTalk-Windows-x86_64.zip
