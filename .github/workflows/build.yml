name: Build HyperXTalk

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
  push:
    tags:
      - 'v*'

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # macOS ARM64
  # ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS ARM64
    runs-on: macos-15        # macOS 15 Sequoia — Apple Silicon (ARM64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Accept Xcode licence
        run: sudo xcodebuild -license accept

      - name: Install Homebrew dependencies
        run: |
          brew install openssl@3 libpq mysql-client pixman meson ninja pkg-config

      - name: Set up Java (Temurin — required by libfoundation JNI bindings)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build prebuilt third-party libraries
        run: make prebuilt-mac
        env:
          BUILDTYPE: ${{ inputs.build_type || 'Release' }}

      - name: Configure (GYP → Xcode projects)
        run: make config-mac

      - name: Compile
        run: make compile-mac CODESIGN_IDENTITY="-"
        env:
          BUILDTYPE: ${{ inputs.build_type || 'Release' }}

      - name: Package (mac-bin)
        run: make package-mac-bin CODESIGN_IDENTITY="-"
        env:
          BUILDTYPE: ${{ inputs.build_type || 'Release' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperXTalk-macOS-ARM64-${{ inputs.build_type || 'Release' }}
          path: mac-bin/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Linux x86_64
  # ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential python3 python3-pip pkg-config \
            libssl-dev libcurl4-openssl-dev \
            libgtk-3-dev libglib2.0-dev \
            libpng-dev libjpeg-dev libfreetype6-dev libfontconfig1-dev \
            libx11-dev libxext-dev libxrender-dev \
            libxinerama-dev libxrandr-dev libxcb1-dev libxv-dev libdbus-1-dev libcups2-dev \
            libgif-dev libpcre3-dev zlib1g-dev \
            default-jdk \
            fuse libfuse2

      - name: Configure (GYP → Makefiles)
        run: ./config.sh --platform linux-x86_64

      - name: Compile
        run: make compile-linux-x86_64
        env:
          BUILDTYPE: ${{ inputs.build_type || 'Release' }}

      - name: Build AppImage
        run: |
          chmod +x packaging/linux/build-appimage.sh
          ./packaging/linux/build-appimage.sh \
            build-linux-x86_64/livecode \
            "${{ inputs.build_type || 'Release' }}"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperXTalk-Linux-x86_64-AppImage
          path: build-linux-x86_64/livecode/HyperXTalk-*.AppImage
          retention-days: 30

      - name: Upload raw build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperXTalk-Linux-x86_64-${{ inputs.build_type || 'Release' }}
          path: linux-x86_64-bin/
          retention-days: 30
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Windows x86_64
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x86_64
    runs-on: windows-latest   # Windows Server 2022 + Visual Studio 2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Scoop
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          # Make scoop shims available to all subsequent steps
          echo "$env:USERPROFILE\scoop\shims" >> $env:GITHUB_PATH

      - name: Install MySQL and PostgreSQL via Scoop
        shell: pwsh
        run: |
          scoop install mysql postgresql

      - name: Restore NuGet packages (WebView2)
        shell: pwsh
        run: |
          $target = "packages\Microsoft.Web.WebView2.1.0.3912.50"
          $webview2h = "$target\build\native\include\WebView2.h"
          if (-not (Test-Path $webview2h)) {
            # Download .nupkg directly from nuget.org and extract it.
            # The nuget CLI "Package already installed" behaviour does not reliably
            # place files in the local output directory, so we bypass it entirely.
            $nupkg = "$env:TEMP\webview2.nupkg"
            Invoke-WebRequest "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/1.0.3912.50" -OutFile $nupkg
            Expand-Archive $nupkg -DestinationPath $target -Force
          }
          if (-not (Test-Path $webview2h)) {
            Write-Error "WebView2.h still not found at: $webview2h"
            exit 1
          }
          Write-Host "WebView2.h found at: $webview2h"

      - name: Prepare libcairo config.h for Windows
        shell: cmd
        run: copy thirdparty\libcairo\src\config.h.win32 thirdparty\libcairo\src\config.h

      - name: Prepare cairo-features.h for Windows
        shell: pwsh
        run: |
          # The committed cairo-features.h was generated for macOS (Quartz backend).
          # Overwrite it with the Windows/Win32 backend feature set.
          Set-Content -Path "thirdparty\libcairo\src\cairo-features.h" -Value @"
          /* Hand-crafted for Windows / MSVC x64 — replaces the macOS meson output. */
          #pragma once
          #define CAIRO_FEATURES_H
          #define CAIRO_HAS_IMAGE_SURFACE 1
          #define CAIRO_HAS_MIME_SURFACE 1
          #define CAIRO_HAS_OBSERVER_SURFACE 1
          #define CAIRO_HAS_PDF_SURFACE 1
          #define CAIRO_HAS_PNG_FUNCTIONS 1
          #define CAIRO_HAS_PS_SURFACE 1
          #define CAIRO_HAS_RECORDING_SURFACE 1
          #define CAIRO_HAS_SCRIPT_SURFACE 1
          #define CAIRO_HAS_SVG_SURFACE 1
          #define CAIRO_HAS_USER_FONT 1
          #define CAIRO_HAS_WIN32_SURFACE 1
          #define CAIRO_HAS_WIN32_FONT 1
          "@

      - name: Prepare pixman-version.h for Windows
        shell: cmd
        run: copy thirdparty\libcairo\subprojects\pixman-0.43.4\pixman\pixman-version.h.win32 thirdparty\libcairo\subprojects\pixman-0.43.4\pixman\pixman-version.h

      - name: Add MSBuild to PATH
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find 'MSBuild\**\Bin\MSBuild.exe' | Select-Object -First 1
          $msbuildDir = Split-Path $msbuild -Parent
          echo $msbuildDir >> $env:GITHUB_PATH

      - name: Inject ATL include path via MSBuild props (needed by kernel for w32-ds-player.cpp)
        shell: pwsh
        run: |
          # kernel.vcxproj (v142 toolset) compiles w32-ds-player.cpp which needs
          # atlbase.h.  The v142 ATL component is not present on this runner, but
          # the v143 ATL headers (already installed) are compatible for compilation
          # purposes.  Rather than fighting the VS installer, we create a small
          # .props file that prepends the ATL include directory to
          # AdditionalIncludeDirectories for every project, then point
          # ForceImportBeforeCppTargets at it so MSBuild picks it up automatically.
          $atl = Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" `
                 -Filter "atlbase.h" -Recurse -ErrorAction SilentlyContinue |
                 Select-Object -First 1
          if (-not $atl) {
            Write-Error "atlbase.h not found anywhere under VS installation"
            exit 1
          }
          $atlDir = $atl.DirectoryName
          Write-Host "ATL headers found at: $atlDir"
          # Also locate atls.lib for the linker (same atlmfc tree, lib\x64 subdir)
          $atlLib = Join-Path (Split-Path $atlDir -Parent) "lib\x64"
          Write-Host "ATL lib dir: $atlLib"
          $propsPath = "${{ github.workspace }}\atl-include.props"
          Set-Content -Path $propsPath -Value @"
          <?xml version="1.0" encoding="utf-8"?>
          <Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003">
            <ItemDefinitionGroup>
              <ClCompile>
                <AdditionalIncludeDirectories>$atlDir;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>
              </ClCompile>
              <Link>
                <AdditionalLibraryDirectories>$atlLib;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>
              </Link>
              <Lib>
                <AdditionalLibraryDirectories>$atlLib;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>
              </Lib>
            </ItemDefinitionGroup>
          </Project>
          "@
          Write-Host "Props file written to: $propsPath"
          echo "ForceImportBeforeCppTargets=$propsPath" >> $env:GITHUB_ENV

      - name: Build thirdparty libraries
        shell: cmd
        run: build-thirdparty-x64.bat
        # The bat builds all thirdparty libs (which we need), then attempts to
        # build development.vcxproj directly — that fails on a clean checkout
        # because startupstack.cpp hasn't been generated yet.  The engine is
        # built correctly by the next step (build-engine-x64.bat), so we
        # allow this step to fail without aborting the job.
        continue-on-error: true

      - name: Build engine (Debug — required by Release bootstrap)
        shell: cmd
        run: build-engine-x64.bat

      - name: Build Release
        shell: cmd
        run: build-release-x64.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperXTalk-Windows-x86_64-${{ inputs.build_type || 'Release' }}
          # Release output: HyperXTalk.exe, standalone-community.exe, externals, DB drivers
          path: build-win-x86_64\livecode\Release\
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release (only on v* tags)
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package artifacts for release
        run: |
          cd artifacts
          # Zip the macOS build
          if [ -d "HyperXTalk-macOS-ARM64-Release" ]; then
            (cd HyperXTalk-macOS-ARM64-Release && zip -r ../HyperXTalk-macOS-ARM64.zip .)
          fi
          # The AppImage is already a single file
          cp HyperXTalk-Linux-x86_64-AppImage/*.AppImage . 2>/dev/null || true
          # Zip the Windows build
          if [ -d "HyperXTalk-Windows-x86_64-Release" ]; then
            (cd HyperXTalk-Windows-x86_64-Release && zip -r ../HyperXTalk-Windows-x86_64.zip .)
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/HyperXTalk-macOS-ARM64.zip
            artifacts/HyperXTalk-*.AppImage
            artifacts/HyperXTalk-Windows-x86_64.zip
